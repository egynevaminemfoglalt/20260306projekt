<!DOCTYPE html>
<html lang="hu">

    <title>Számkitaláló Játék</title>

<body>

    <div class="jatek-doboz">
        <h1>Számkitaláló</h1>

        <button id="ujra-gomb" onclick="ujJatek()" style="display: none;">Új játék</button>
    </div>

    <script src="kulon.js"></script>

</html>
